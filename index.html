<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Ball</title>
  <style>
    :root {
      --bg-1: #09111f;
      --bg-2: #10233d;
      --panel: rgba(10, 18, 32, 0.72);
      --line: rgba(173, 216, 255, 0.18);
      --text: #eef6ff;
      --muted: #a6b8cf;
      --accent: #66e3ff;
      --accent-2: #ffc857;
      --yes: #87ffb2;
      --no: #ff8494;
      --mage: #d7a6ff;
      --shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(102, 227, 255, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(215, 166, 255, 0.18), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42vmax;
      height: 42vmax;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      pointer-events: none;
    }

    body::before {
      top: -10vmax;
      left: -12vmax;
      background: #3fe7ff;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::after {
      right: -10vmax;
      bottom: -10vmax;
      background: #c58aff;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.95) 0 1px, transparent 1.8px),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,0.7) 0 1px, transparent 2px),
        radial-gradient(circle at 35% 75%, rgba(255,255,255,0.85) 0 1px, transparent 2px),
        radial-gradient(circle at 85% 62%, rgba(255,255,255,0.75) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 45%, rgba(255,255,255,0.85) 0 1px, transparent 2px);
      background-size: 320px 320px;
      opacity: 0.26;
      pointer-events: none;
    }

    .stars::before {
      transform: scale(1.2);
      opacity: 0.15;
      animation: twinkle 10s linear infinite;
    }

    .stars::after {
      transform: scale(1.45);
      opacity: 0.1;
      animation: twinkle 16s linear infinite reverse;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      position: relative;
      width: min(100%, 920px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      display: grid;
      gap: 28px;
      grid-template-columns: 1.08fr 0.92fr;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.08), transparent 35%),
        linear-gradient(180deg, transparent, rgba(102, 227, 255, 0.06));
      pointer-events: none;
    }

    .copy {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: center;
      gap: 16px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--accent);
      background: rgba(255,255,255,0.04);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 70px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      max-width: 44ch;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 18px);
      line-height: 1.6;
    }

    .ask-box {
      display: grid;
      gap: 12px;
      margin-top: 6px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }

    input,
    button {
      border: 0;
      border-radius: 18px;
      font: inherit;
    }

    input {
      min-width: 0;
      padding: 17px 18px;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      outline: 1px solid rgba(255,255,255,0.08);
      transition: outline-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    input::placeholder {
      color: #8ca1bc;
    }

    input:focus {
      outline-color: rgba(102, 227, 255, 0.65);
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    button {
      padding: 17px 22px;
      cursor: pointer;
      font-weight: 800;
      color: #07111f;
      background: linear-gradient(135deg, var(--accent), #b0f5ff 72%);
      box-shadow: 0 10px 30px rgba(102, 227, 255, 0.25);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 36px rgba(102, 227, 255, 0.35);
      filter: brightness(1.03);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .stage {
      position: relative;
      min-height: 480px;
      display: grid;
      place-items: center;
    }

    .ball-wrap {
      position: relative;
      width: min(68vw, 360px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      animation: float 6s ease-in-out infinite;
    }

    .ball-aura {
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(102, 227, 255, 0.3), transparent 44%),
        radial-gradient(circle at 60% 35%, rgba(215, 166, 255, 0.38), transparent 30%);
      filter: blur(14px);
      opacity: 0.7;
    }

    .ball {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 50% 35%, #1f3b69 0 16%, #081223 58%, #040811 100%);
      box-shadow:
        inset -24px -36px 60px rgba(0, 0, 0, 0.55),
        inset 18px 24px 40px rgba(150, 220, 255, 0.18),
        0 30px 100px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .ball::before {
      content: "";
      position: absolute;
      inset: 12% 12% auto auto;
      width: 20%;
      height: 20%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.7), transparent 68%);
      filter: blur(4px);
      opacity: 0.85;
    }

    .answer-window {
      position: absolute;
      inset: 50%;
      width: 44%;
      height: 44%;
      transform: translate(-50%, -22%) rotate(45deg);
      border-radius: 22%;
      background:
        linear-gradient(135deg, rgba(9, 19, 37, 0.96), rgba(24, 44, 76, 0.98));
      border: 1px solid rgba(186, 228, 255, 0.18);
      box-shadow:
        inset 0 0 28px rgba(120, 220, 255, 0.12),
        0 0 42px rgba(102, 227, 255, 0.08);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .answer-window::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 18%;
      background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 72%);
    }

    .answer-text {
      position: relative;
      z-index: 1;
      width: 78%;
      transform: rotate(-45deg);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
      font-size: clamp(20px, 4vw, 34px);
      line-height: 1.05;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(102, 227, 255, 0.28);
      transition: opacity 180ms ease, transform 240ms ease;
    }

    .answer-text.small {
      font-size: clamp(14px, 2.5vw, 18px);
    }

    .ball.shaking {
      animation: shake 820ms cubic-bezier(.36,.07,.19,.97) both;
    }

    .answer-text.flash {
      opacity: 0.25;
      transform: rotate(-45deg) scale(0.9);
    }

    .result-chip {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(5, 10, 20, 0.48);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .yes {
      color: var(--yes);
      text-shadow: 0 0 18px rgba(135, 255, 178, 0.3);
    }

    .no {
      color: var(--no);
      text-shadow: 0 0 18px rgba(255, 132, 148, 0.26);
    }

    .mage {
      color: var(--mage);
      text-shadow: 0 0 18px rgba(215, 166, 255, 0.3);
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 0 14px currentColor;
      animation: sparkle 2.8s linear infinite;
    }

    .sparkles span:nth-child(1) {
      top: 14%;
      left: 18%;
      color: #9ff6ff;
      animation-delay: 0s;
    }

    .sparkles span:nth-child(2) {
      top: 24%;
      right: 12%;
      color: #ffe087;
      animation-delay: 0.7s;
    }

    .sparkles span:nth-child(3) {
      bottom: 18%;
      left: 16%;
      color: #c59fff;
      animation-delay: 1.4s;
    }

    .sparkles span:nth-child(4) {
      bottom: 11%;
      right: 20%;
      color: #94ffd4;
      animation-delay: 2.1s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(4vmax, 2vmax, 0) scale(1.12); }
    }

    @keyframes twinkle {
      from { transform: translateY(0); }
      to { transform: translateY(-20px); }
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(0.4); opacity: 0.2; }
      40% { transform: scale(1); opacity: 1; }
      70% { transform: scale(0.6); opacity: 0.55; }
    }

    @media (max-width: 860px) {
      .card {
        grid-template-columns: 1fr;
        padding: 22px;
      }

      .copy {
        gap: 14px;
      }

      .stage {
        min-height: 380px;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px;
      }

      .card {
        gap: 20px;
        padding: 18px;
        border-radius: 22px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .stage {
        min-height: 320px;
      }

      .result-chip {
        bottom: 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <main class="page">
    <section class="card">
      <div class="copy">
        <span class="eyebrow">Magic Ball Oracle</span>
        <h1>Ask the ball, if you dare</h1>
        <p class="lead">
          Type any question, press Enter or the button, and the magic ball will give its verdict:
          yes or no.
        </p>

        <div class="ask-box">
          <div class="input-row">
            <input
              id="questionInput"
              type="text"
              maxlength="160"
              placeholder="For example: Should I push to master today?"
              autocomplete="off"
            >
            <button id="askButton" type="button">Find out fate</button>
          </div>
          <p class="hint">Ask a question. Empty input is ignored.</p>
        </div>
      </div>

      <div class="stage">
        <div class="ball-wrap">
          <div class="ball-aura"></div>
          <div class="sparkles" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="ball" id="magicBall">
            <div class="answer-window">
              <div class="answer-text yes" id="answerText">ASK A QUESTION</div>
            </div>
          </div>
        </div>
        <div class="result-chip" id="resultChip">mode: waiting</div>
      </div>
    </section>
  </main>

  <script>
    const questionInput = document.getElementById("questionInput");
    const askButton = document.getElementById("askButton");
    const magicBall = document.getElementById("magicBall");
    const answerText = document.getElementById("answerText");
    const resultChip = document.getElementById("resultChip");

    const answers = [
      { text: "YES", tone: "yes" },
      { text: "NO", tone: "no" },
    ];

    let busy = false;

    function pickAnswer(question) {
      const seed = [...question].reduce((sum, char, index) => {
        return sum + char.charCodeAt(0) * (index + 1);
      }, 0);

      const randomizer = Math.floor(Math.random() * answers.length);
      return answers[(seed + randomizer) % answers.length];
    }

    function setAnswer(answer) {
      answerText.textContent = answer.text;
      answerText.className = "answer-text " + answer.tone + (answer.small ? " small" : "");

      const labelMap = {
        yes: "mode: yes",
        no: "mode: no"
      };

      resultChip.textContent = labelMap[answer.tone] || "режим: предсказание";
    }

    function shakeBall() {
      magicBall.classList.remove("shaking");
      void magicBall.offsetWidth;
      magicBall.classList.add("shaking");
    }

    function askOracle() {
      const question = questionInput.value.trim();

      if (!question || busy) {
        if (!question) {
          answerText.textContent = "ASK A QUESTION";
          answerText.className = "answer-text no small";
          resultChip.textContent = "mode: question required";
        }
        return;
      }

      busy = true;
      shakeBall();
      answerText.textContent = "...";
      answerText.className = "answer-text yes flash";
      resultChip.textContent = "mode: reading signs";

      window.setTimeout(() => {
        const answer = pickAnswer(question);
        setAnswer(answer);
        busy = false;
      }, 900);
    }

    askButton.addEventListener("click", askOracle);

    questionInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        askOracle();
      }
    });
  </script>
</body>
</html>
